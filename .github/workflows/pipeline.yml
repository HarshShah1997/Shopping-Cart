name: Shopping Cart CI/CD Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

env:
  IMAGE_NAME: swapnilbhiungade/shopping-cart:latest

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Run Flake8
        run: flake8 .

  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest --cov=. --cov-fail-under=50

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit
        run: bandit -r . -x tests

  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker Image
        run: docker push $IMAGE_NAME

  image_scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library
          trivyignores: .trivyignore

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: image_scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/shopping-cart -n shopping-cart --timeout=180s

      - name: Check Kubernetes Resources
        run: |
          echo "===== NAMESPACES ====="
          kubectl get ns

          echo "===== ALL IN shopping-cart ====="
          kubectl get all -n shopping-cart

          echo "===== SERVICES ====="
          kubectl get svc -A

      - name: Debug Kubernetes Logs
        if: always()
        run: |
          echo "===== POD DETAILS ====="
          kubectl describe pods -n shopping-cart || true

          echo "===== APP LOGS ====="
          kubectl logs deployment/shopping-cart -n shopping-cart || true

      - name: Access Application
        run: |
          URL=$(minikube service shopping-cart-service -n shopping-cart --url)
          echo "Application URL: $URL"