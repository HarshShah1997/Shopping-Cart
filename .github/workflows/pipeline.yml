name: Shopping Cart DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: swapnilbhiungade/shopping-cart:latest

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 bandit

      - name: Run Flake8 Lint
        run: |
          flake8 .

      - name: Run Bandit Security Scan
        run: |
          bandit -r . -x tests

      - name: Run Pytest
        run: |
          pytest \
          --cov=. \
          --cov-report=term \
          --cov-report=xml \
          --cov-fail-under=50

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME

      - name: Smoke Test Container
        run: |
          docker run -d --name smoke-test -p 5000:5000 $IMAGE_NAME
          sleep 15
          curl --fail http://localhost:5000 || exit 1
          docker rm -f smoke-test

      - name: Pipeline Completed
        run: echo "Build + Test + Scan + Push successful"