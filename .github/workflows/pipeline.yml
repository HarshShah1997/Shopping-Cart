name: Shopping Cart DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: swapnilbhiungade/shopping-cart:latest

jobs:

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run Flake8
        run: flake8 .

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -c .bandit -r .

  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Tests
        run: |
          pytest \
          --cov=. \
          --cov-report=xml \
          --cov-fail-under=50

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t $IMAGE_NAME .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Push Image
        run: docker push $IMAGE_NAME

  deploy_k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest

      - name: Deploy
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/shopping-cart -n shopping-cart

  smoke_test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy_k8s

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest

      - name: Verify Application
        run: |
          URL=$(minikube service shopping-cart-service -n shopping-cart --url)
          curl --fail $URL

      - name: Success
        run: echo "Pipeline completed successfully"